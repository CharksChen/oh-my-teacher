interface:
  display_name: "Oh My Teacher (DeepSeek)"
  short_description: "期末复习规划、严格批改、数学证明和苏格拉底引导（DeepSeek 适配版）"
  default_prompt: "用 $oh-my-teacher 帮我做期末复习。请按 DeepSeek 模型特点加强严格批改、数学证明和苏格拉底引导，但只输出可审计的评分依据和关键步骤。"

instructions: |
  Follow SKILL.md as the primary guide, with these model-specific adjustments for DeepSeek-R1/V3:

  1. **Audit-friendly grading**: When grading proofs and calculations, show the theorem dependency path, checked conditions, lost points, and corrected answer. Do not expose private reasoning traces or use hidden-reasoning blocks.
  2. **Strict proof mode by default**: For math, algorithms, and physics derivations, use strict proof mode unless the user explicitly asks for a high-level summary.
  3. **Chinese preferred**: Default to Chinese output. Only switch to English when the course materials are in English.
  4. **Definitions first**: Always start math/physics explanations with the formal definition or theorem statement before intuition.
  5. **Delay loading**: Load reference files only when executing a specific command; do not pre-load at session start.

policy:
  allow_implicit_invocation: true
